<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width-device-width, initial-scale = 1.0">
    <title>PIZZA by the SLICE</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
      <h1>Welcome to PIZZA by the SLICE!🍕</h1>
    
    <h1>Sign In</h1>
      <form action="#" method="POST">
        <label for="fname">Name</label><br>
        <input type="text" id="fname" name="fname" 
          minlength="5" maxlength="60" 
          placeholder="Enter your name" required><br>
        
        <label for="email">Email</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email"><br>
        
        <label for="phoneNum">Phone Number</label> <br>
        <input type="number" id="phoneNum" name="phoneNum" 
          minlength="7" maxlength="11" 
          placeholder="Enter phone number"><br>
          
        <label for="age">Age</label> <br>
        <input type="number" id="age" name="age"min="13" max="99" placeholder="Enter age"><br>
        
        <input type="submit" value="Sign in"><input type="reset" value="Reset"><br>
        
    </form>
  </body>
</html>
